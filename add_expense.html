<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Expense Record</title>
    <style>
        body {
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background-color: #eef1f4;
            color: #1f2933;
        }

        .page-box {
            width: 60%;
            margin: 45px auto;
            background-color: #fffdf8;
            border: 2px solid #d8dee6;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        }

        .page-header {
            background-color: #243447;
            color: white;
            padding: 22px;
            text-align: center;
        }

        .page-header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 0.5px;
        }

        .form-area {
            padding: 30px 35px;
        }

        .form-row {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: bold;
            color: #2f3e4d;
        }

        input, select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #b8c2cc;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fdfdfd;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #243447;
            background-color: #ffffff;
        }

        .button-row {
            margin-top: 28px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 11px 20px;
            margin: 6px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-save {
            background-color: #243447;
            color: white;
        }

        .btn-save:hover {
            background-color: #1b2836;
        }

        .btn-back {
            background-color: #d9a441;
            color: white;
        }

        .btn-back:hover {
            background-color: #bf8d31;
        }

        .note {
            text-align: center;
            font-size: 14px;
            color: #5c6b77;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="page-box">
        <div class="page-header">
            <h1>Create Expense Record</h1>
        </div>

        <div class="form-area">
            <form method="POST">
                <div class="form-row">
                    <label for="date">Expense Date</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-row">
                    <label for="cost_gbp">Amount in GBP</label>
                    <input type="number" step="0.01" id="cost_gbp" name="cost_gbp" required>
                </div>

                <div class="form-row">
                    <label for="description">Expense Description</label>
                    <input type="text" id="description" name="description" placeholder="Example: Bus ticket, grocery items, electricity payment" required>
                </div>

                <div class="form-row">
                    <label for="expense_type">Expense Category</label>
                    <select id="expense_type" name="expense_type" required>
                        <option value="Transport">Transport</option>
                        <option value="Food">Food</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-save">Create Record</button>
                    <a href="/" class="btn btn-back">Return Home</a>
                </div>

                <p class="note">Enter the expense information carefully before saving it to the system.</p>
            </form>
        </div>
    </div>
</body>
</html>
